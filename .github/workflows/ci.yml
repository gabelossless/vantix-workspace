name: CI

on: [push, pull_request]

jobs:
  daemon:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vantix-daemon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo check --features local-embeddings
      - run: cargo test
      - run: cargo test --features local-embeddings

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vantix-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vantix-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
